<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Apex Dynamics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --bg: #0a0a0a; --text: #ffffff; --primary: #ef4444; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { margin: 0; padding: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
.nav { display: flex; justify-content: space-between; padding: 2rem 5%; position: absolute; width: 100%; z-index: 10; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); }
.logo { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; color: white; }
.nav-links { display: flex; gap: 3rem; align-items: center; }
.nav-links a { text-decoration: none; color: white; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
.nav-links a:hover { color: var(--primary); }
.menu-btn { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
.menu-btn:hover { background: rgba(255,255,255,0.1); }
.menu-icon { width: 16px; height: 2px; background: white; position: relative; }
.menu-icon::before, .menu-icon::after { content: ''; position: absolute; width: 16px; height: 2px; background: white; left: 0; }
.menu-icon::before { top: -5px; } .menu-icon::after { top: 5px; }
.page-header { padding: 12rem 5% 4rem; max-width: 1200px; margin: 0 auto; text-align: center; }
.page-header h1 { font-size: 5rem; font-weight: 800; line-height: 1; letter-spacing: -0.04em; margin-bottom: 1.5rem; text-transform: uppercase; }
.page-header p { font-size: 1.25rem; color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto; line-height: 1.6; }
.contact-form-wrapper { max-width: 800px; margin: 0 auto 8rem; padding: 4rem; background: #111; border: 1px solid #222; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
.form-group { display: flex; flex-direction: column; }
.form-group.full { grid-column: 1 / -1; }
label { text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.5rem; color: #a3a3a3; }
input, textarea { background: transparent; border: none; border-bottom: 1px solid #444; color: white; padding: 1rem 0; font-size: 1rem; font-family: inherit; transition: border-color 0.3s; }
input:focus, textarea:focus { outline: none; border-color: var(--primary); }
textarea { resize: vertical; min-height: 100px; }
.btn { padding: 1.25rem 3rem; background: var(--primary); border: none; color: white; text-transform: uppercase; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.3s; width: 100%; }
.btn:hover { background: #dc2626; }
@media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .contact-form-wrapper { padding: 2rem; } }
</style>
</head>
<body>
<nav class="nav">
    <a href="index.html" class="logo">Apex Dynamics</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>
    
</nav>

<div class="page-header" style="position:relative; overflow:hidden; color:white; padding: 12rem 5% 6rem; margin-top:-100px;">
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:url('contact-bg.png') center/cover; z-index:-2;"></div>
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.3)); z-index:-1;"></div>
    <div style="position:relative; z-index:1; max-width:800px; margin:0 auto;">
        <h1 style="color:white; margin-bottom:1.5rem;">Contact.</h1>
        <p>図面のお見積もり、工場見学のご依頼、技術的なご相談など、お気軽にお問い合わせください。</p>
    </div>
</div>

<div class="contact-form-wrapper">
    <form onsubmit="event.preventDefault(); alert('Inquiry Sent. (Demo)');">
        <div class="form-grid">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" required>
            </div>
            <div class="form-group full">
                <label>Company Name</label>
                <input type="text" required>
            </div>
            <div class="form-group full">
                <label>Email Address</label>
                <input type="email" required>
            </div>
            <div class="form-group full">
                <label>Message / Specifications</label>
                <textarea required></textarea>
            </div>
        </div>
        <button type="submit" class="btn">Submit Inquiry</button>
    </form>
</div>
</body>
</html>
