<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Dynamics | Industrial Precision</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --bg: #0a0a0a; --text: #ffffff; --primary: #ef4444; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); overflow-x: hidden; }
.nav { display: flex; justify-content: space-between; padding: 2rem 5%; position: absolute; width: 100%; z-index: 10; align-items: center; }
.logo { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; color: white; }
.nav-links { display: flex; gap: 3rem; align-items: center; }
.nav-links a { text-decoration: none; color: white; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; }
.nav-links a:hover { color: var(--primary); }
.menu-btn { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
.menu-btn:hover { background: rgba(255,255,255,0.1); }
.menu-icon { width: 16px; height: 2px; background: white; position: relative; }
.menu-icon::before, .menu-icon::after { content: ''; position: absolute; width: 16px; height: 2px; background: white; left: 0; }
.menu-icon::before { top: -5px; } .menu-icon::after { top: 5px; }
.hero { height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; }
.hero::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%); z-index: 0; }
.hero img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; transform: scale(1.05); transition: transform 10s ease-out; }
.hero:hover img { transform: scale(1); }
.hero-content { padding: 0 5%; max-width: 1200px; position: relative; z-index: 1; }
h1 { font-size: 7rem; font-weight: 800; line-height: 0.95; letter-spacing: -0.04em; margin-bottom: 2rem; text-transform: uppercase; }
h1 span { color: var(--primary); }
p { font-size: 1.25rem; color: rgba(255,255,255,0.7); max-width: 500px; line-height: 1.6; margin-bottom: 3rem; }
.btn { padding: 1.25rem 3rem; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; text-transform: uppercase; font-weight: 600; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 4px; backdrop-filter: blur(5px); }
.btn:hover { background: white; color: black; border-color: white; transform: translateY(-2px); }
@media (max-width: 768px) { h1 { font-size: 4rem; } .hero::after { background: rgba(0,0,0,0.7); } }
</style>
</head>
<body>
<nav class="nav">
    <a href="index.html" class="logo">Apex Dynamics</a>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>
    
</nav>
<section class="hero">
    <img src="hero.png" alt="Precision Manufacturing">
    <div class="hero-content">
        <h1>Precision.<br><span>Performance.</span></h1>
        <p>1ミクロンの精度が、世界を変える。最先端の加工技術と自動化システムで、あらゆる産業の未来を製造します。</p>
        <a href="services.html" class="btn" style="text-decoration:none; display:inline-block;">Discover Tech</a>
    </div>
</section>
</body>
</html>
